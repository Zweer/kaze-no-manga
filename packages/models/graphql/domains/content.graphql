type Manga {
  id: ID!
  slug: String!
  title: String!
  altTitles: [String!]!
  description: String
  cover: String
  status: MangaStatus!
  genres: [String!]!
  authors: [String!]!
  year: Int
  totalChapters: Int
  isNsfw: Boolean!
  sourceName: String!
  sourceId: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Chapter {
  id: ID!
  mangaId: ID!
  number: Float!
  title: String
  releaseDate: AWSDateTime
  images: [ChapterImage!]!
  createdAt: AWSDateTime!
}

type ChapterImage {
  url: String!
  page: Int!
  width: Int
  height: Int
}

enum MangaStatus {
  ONGOING
  COMPLETED
  HIATUS
  CANCELLED
}

input MangaFilters {
  status: MangaStatus
  genres: [String!]
  isNsfw: Boolean
}

extend type Query {
  getManga(id: ID!): Manga
  getMangaBySlug(slug: String!): Manga
  searchManga(query: String!, limit: Int): [Manga!]!
  getChapters(mangaId: ID!, limit: Int, nextToken: String): ChapterConnection!
}

type ChapterConnection {
  items: [Chapter!]!
  nextToken: String
}

extend type Mutation {
  createManga(input: CreateMangaInput!): Manga! @aws_iam
  createChapter(input: CreateChapterInput!): Chapter! @aws_iam
}

input CreateMangaInput {
  slug: String!
  title: String!
  altTitles: [String!]
  description: String
  cover: String
  status: MangaStatus!
  genres: [String!]
  authors: [String!]
  year: Int
  isNsfw: Boolean
  sourceName: String!
  sourceId: String!
}

input CreateChapterInput {
  mangaId: ID!
  number: Float!
  title: String
  releaseDate: AWSDateTime
  images: [ChapterImageInput!]!
}

input ChapterImageInput {
  url: String!
  page: Int!
  width: Int
  height: Int
}
